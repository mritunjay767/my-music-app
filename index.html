<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="brand">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_with_text.svg" alt="Spotify logo">
                <h2>Spotify Clone</h2>
            </div>

            <ul>
                <li class="active">Home</li>
                <li>Search</li>
                <li>Your Library</li>
                <li>Liked Songs</li>
            </ul>
        </nav>

        <main class="main-view">
            <section class="top-bar">
                <h1>My Playlist</h1>
                <p>Chill beats and favorite tracks with a dark Spotify-style layout.</p>
            </section>

            <div class="song-list" id="songList"></div>
        </main>
    </div>

    <div class="player-bar">
        <div class="progress-container">
            <input type="range" id="progressBar" value="0" min="0" max="100">
        </div>
        <div class="controls">
            <button id="prev">Previous</button>
            <button id="masterPlay">Play</button>
            <button id="next">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
